name: Optional protected model evals

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  model-evals:
    runs-on: ubuntu-latest
    env:
      EVAL_OPENAI_API_KEY: ${{ secrets.EVAL_OPENAI_API_KEY }}
      EVAL_OPENAI_BASE_URL: ${{ secrets.EVAL_OPENAI_BASE_URL }}
      EVAL_OPENAI_MODEL: ${{ secrets.EVAL_OPENAI_MODEL }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - name: Run optional OpenAI-compatible model behavior evaluation
        if: ${{ env.EVAL_OPENAI_API_KEY != '' && env.EVAL_OPENAI_BASE_URL != '' && env.EVAL_OPENAI_MODEL != '' }}
        run: python scripts/run_deterministic_evals.py --adapter openai-compatible
      - name: Record unavailable optional adapter
        if: ${{ env.EVAL_OPENAI_API_KEY == '' || env.EVAL_OPENAI_BASE_URL == '' || env.EVAL_OPENAI_MODEL == '' }}
        run: |
          mkdir -p eval-results
          printf '%s\n' 'SKIPPED: optional OpenAI-compatible adapter is not configured.' > eval-results/model-eval-status.md
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: redacted-model-eval-results-${{ github.run_id }}
          path: eval-results/
