name: Validate skill collection

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Static quality gates
        run: python scripts/ci.py validate
      - name: Changed-skill contract and context smoke evals
        if: github.event_name == 'pull_request' && runner.os == 'Linux'
        shell: bash
        run: |
          changed="$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} | sed -n 's#^skills/\([^/]*\)/.*#\1#p' | sort -u)"
          for skill in $changed; do python scripts/run_deterministic_evals.py --skill "$skill"; done
      - name: Full deterministic contract/context and composition evals
        run: python scripts/ci.py eval:all
      - name: Standalone package release gate
        run: python scripts/ci.py package:check
      - name: Check for obvious private key files
        if: runner.os == 'Linux'
        run: |
          ! find . -type f \( -name '*.pem' -o -name '*.p12' -o -name '*.pfx' \) -not -path './.git/*' | grep .
      - name: Upload redacted eval reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: eval-results-${{ github.run_id }}
          path: eval-results/
          if-no-files-found: error
